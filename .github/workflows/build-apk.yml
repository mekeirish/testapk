name: Build APK Android
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configuration Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Construction de l'environnement PWA → APK
        run: |
          mkdir -p capacitor-app/www
          rsync -av --exclude='capacitor-app' --exclude='.git' --exclude='.github' ./ capacitor-app/www/
          cd capacitor-app
          npm init -y
          npm install @capacitor/core @capacitor/android @capacitor/haptics @capacitor/local-notifications
          npm install -D @capacitor/cli
          cat > capacitor.config.json << JSONEOF
          {
            "appId": "com.brahim.testapk",
            "appName": "testapk",
            "webDir": "www",
            "bundledWebRuntime": true
          }
          JSONEOF
          npx cap init "testapk" "com.brahim.testapk" --web-dir www
          npx cap add android

      - name: 🔐 Détection et injection automatique des permissions
        run: |
          cd capacitor-app/www
          MANIFEST="../android/app/src/main/AndroidManifest.xml"
          
          add_permission() {
            local perm="$1"
            if ! grep -q "android.permission.$perm" "$MANIFEST"; then
              sed -i "/<manifest/a\    <uses-permission android:name=\"android.permission.$perm\" />" "$MANIFEST"
              echo "✅ Permission $perm ajoutée"
            else
              echo "✅ Permission $perm déjà présente"
            fi
          }
          
          rm -f .need_*_shim
          
          add_permission "INTERNET"
          add_permission "ACCESS_NETWORK_STATE"
          
          if grep -rq -E "navigator\.vibrate|\.vibrate\(" .; then
            add_permission "VIBRATE"
            touch .need_vibrate_shim
            echo "   (détecté: navigator.vibrate ou .vibrate() dans le code)"
          fi
          
          if grep -rq -E "navigator\.geolocation|getCurrentPosition|watchPosition" .; then
            add_permission "ACCESS_FINE_LOCATION"
            add_permission "ACCESS_COARSE_LOCATION"
            touch .need_geolocation_shim
            echo "   (détecté: API de géolocalisation utilisée)"
          fi
          
          if grep -rq -E "getUserMedia.*video|video.*getUserMedia" .; then
            add_permission "CAMERA"
            touch .need_camera_shim
            echo "   (détecté: getUserMedia avec video)"
          fi
          
          if grep -rq -E "getUserMedia.*audio|audio.*getUserMedia" .; then
            add_permission "RECORD_AUDIO"
            touch .need_microphone_shim
            echo "   (détecté: getUserMedia avec audio)"
          fi
          
          if grep -rq -E "new Notification\(|Notification\.requestPermission" .; then
            add_permission "POST_NOTIFICATIONS"
            touch .need_notification_shim
            echo "   (détecté: Notification API utilisée)"
          fi
          
          echo "🔐 Analyse des permissions terminée"

      - name: 🌉 Injection des shims JS-vers-natif
        run: |
          cd capacitor-app/www
          NEED_VIBRATE=false
          NEED_NOTIFICATION=false
          [ -f .need_vibrate_shim ] && NEED_VIBRATE=true
          [ -f .need_notification_shim ] && NEED_NOTIFICATION=true
          if [ "$NEED_VIBRATE" = "false" ] && [ "$NEED_NOTIFICATION" = "false" ]; then
            echo "ℹ️ Aucun shim nécessaire"
          else
            echo "📝 Génération de shims.js..."
            cat > shims.js << 'SHIMEOF'
          (function() {
            var Capacitor = window.Capacitor;
            var isNative = !!(Capacitor && Capacitor.Plugins);
            console.log('🔌 Shims: mode', isNative ? 'natif' : 'web');
          })();
          SHIMEOF
            if [ "$NEED_VIBRATE" = "true" ]; then
              cat >> shims.js << 'VIBEOF'
          (function() {
            var Capacitor = window.Capacitor;
            if (Capacitor && Capacitor.Plugins && Capacitor.Plugins.Haptics) {
              navigator.vibrate = function(pattern) {
                var duration = (typeof pattern === 'number') ? pattern
                  : (Array.isArray(pattern) && pattern.length > 0) ? pattern[0] : 200;
                try { Capacitor.Plugins.Haptics.vibrate({ duration: duration }); } catch (e) {}
                return true;
              };
              console.log('🔌 Shim Vibration actif');
            }
          })();
          VIBEOF
              echo "✅ Shim vibration ajouté"
            fi
            if [ "$NEED_NOTIFICATION" = "true" ]; then
              cat >> shims.js << 'NOTIFEOF'
          (function() {
            var Capacitor = window.Capacitor;
            if (Capacitor && Capacitor.Plugins && Capacitor.Plugins.LocalNotifications) {
              window.Notification = function(title, options) {
                options = options || {};
                var id = Date.now() + Math.floor(Math.random() * 1000);
                try {
                  Capacitor.Plugins.LocalNotifications.schedule({
                    notifications: [{ id: id, title: title || '', body: options.body || '', schedule: { at: new Date() } }]
                  });
                } catch (e) {}
                return { title: title, body: options.body, close: function() {} };
              };
              window.Notification.requestPermission = function() {
                if (Capacitor.Plugins.LocalNotifications.requestPermissions) {
                  return Capacitor.Plugins.LocalNotifications.requestPermissions().then(function(result) {
                    return (result && result.display === 'granted') ? 'granted' : 'denied';
                  });
                }
                return Promise.resolve('granted');
              };
              window.Notification.permission = 'granted';
              console.log('🔌 Shim Notification actif');
            }
          })();
          NOTIFEOF
              echo "✅ Shim notification ajouté"
            fi
            echo "✅ shims.js généré avec succès"
          fi

      - name: 🔌 Téléchargement et injection chirurgicale du Bridge
        run: |
          cd capacitor-app/www
          MAIN_HTML=$(find . -maxdepth 1 -name "*.html" | head -n 1)
          if [ -z "$MAIN_HTML" ]; then
            echo "⚠️ Aucun fichier HTML trouvé"
          else
            curl -s -o bridge.js "https://raw.githubusercontent.com/mekeirish/APK-Creator/main/bridge.js" || echo "⚠️ Téléchargement échoué"
            if [ -f "../node_modules/@capacitor/core/dist/capacitor.js" ]; then
              cp ../node_modules/@capacitor/core/dist/capacitor.js capacitor.js
            else
              touch capacitor.js
              echo "⚠️ capacitor.js introuvable"
            fi
            # Copie des plugins JS
            if [ -f "../node_modules/@capacitor/haptics/dist/plugin.cjs.js" ]; then
              cp ../node_modules/@capacitor/haptics/dist/plugin.cjs.js haptics-plugin.js
            elif [ -f "../node_modules/@capacitor/haptics/dist/plugin.js" ]; then
              cp ../node_modules/@capacitor/haptics/dist/plugin.js haptics-plugin.js
            else
              touch haptics-plugin.js
              echo "⚠️ JS du plugin Haptics introuvable"
            fi
            if [ -f "../node_modules/@capacitor/local-notifications/dist/plugin.cjs.js" ]; then
              cp ../node_modules/@capacitor/local-notifications/dist/plugin.cjs.js localnotifications-plugin.js
            elif [ -f "../node_modules/@capacitor/local-notifications/dist/plugin.js" ]; then
              cp ../node_modules/@capacitor/local-notifications/dist/plugin.js localnotifications-plugin.js
            else
              touch localnotifications-plugin.js
              echo "⚠️ JS du plugin LocalNotifications introuvable"
            fi
            node -e "
              const fs = require('fs');
              const htmlFile = '${MAIN_HTML}';
              let content = fs.readFileSync(htmlFile, 'utf8');
              let parts = content.split(/<\/body>/i);
              if (parts.length > 1) {
                let lastPart = parts.pop();
                let scripts = '<script src="capacitor.js"><\/script>\n';
                scripts += '<script src="haptics-plugin.js"><\/script>\n';
                scripts += '<script src="localnotifications-plugin.js"><\/script>\n';
                if (fs.existsSync('shims.js')) {
                  scripts += '<script src="shims.js"><\/script>\n';
                }
                scripts += '<script src="bridge.js"><\/script>\n</body>';
                let newContent = parts.join('</body>') + scripts + lastPart;
                fs.writeFileSync(htmlFile, newContent, 'utf8');
                console.log('✅ Bridge injecté chirurgicalement');
                if (fs.existsSync('shims.js')) {
                  console.log('✅ shims.js également injecté');
                }
              } else {
                console.log('⚠️ Aucun </body> trouvé, injection à la fin');
                let append = '<script src="capacitor.js"><\/script>\n';
                append += '<script src="haptics-plugin.js"><\/script>\n';
                append += '<script src="localnotifications-plugin.js"><\/script>\n';
                if (fs.existsSync('shims.js')) {
                  append += '<script src="shims.js"><\/script>\n';
                }
                append += '<script src="bridge.js"><\/script>\n';
                fs.appendFileSync(htmlFile, append);
              }
            "
          fi

      - name: 🔄 Synchronisation des assets vers Android
        run: |
          cd capacitor-app
          npx cap sync android

      - name: Génération automatique de l'icône
        run: |
          cd capacitor-app
          npm install -D @capacitor/assets
          mkdir -p assets
          if [ -f "../icon.png" ]; then
            cp ../icon.png assets/icon.png
            npx @capacitor/assets generate --android
          else
            echo "⚠️ icon.png introuvable"
          fi

      - name: Résolution des conflits Kotlin
        run: |
          echo "configurations.all { exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'; exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8' }" >> capacitor-app/android/app/build.gradle

      - name: Compilation de l'APK
        run: |
          cd capacitor-app/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Renommer l'APK
        run: |
          cd capacitor-app/android/app/build/outputs/apk/debug/
          mv app-debug.apk testapk-debug.apk

      - name: Publication de l'APK en Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "capacitor-app/android/app/build/outputs/apk/debug/testapk-debug.apk"
          tag: "latest"
          name: "testapk Latest Build"
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}