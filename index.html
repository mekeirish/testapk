<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouton Vibration + Notification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 60px;
            padding: 0 10px;
        }
        button {
            padding: 20px 40px;
            font-size: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        button:active {
            background-color: #45a049;
        }
        #status {
            margin-top: 30px;
            font-size: 18px;
        }
        #debugConsole {
            margin-top: 30px;
            text-align: left;
            background: #111;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            border-radius: 8px;
            height: 250px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        #copyBtn {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 14px;
            background-color: #2196F3;
        }
        #copyBtn:active {
            background-color: #1976D2;
        }
    </style>
</head>
<body>

    <h1>Bouton Vibration + Notification</h1>
    
    <button onclick="declencherAction()">🔄 Vibrer + Notification dans 30s</button>

    <p id="status"></p>

    <button id="copyBtn" onclick="copyDebugLog()">📋 Copier les logs</button>
    <div id="debugConsole"></div>

    <script>
        // === CAPTURE DE LA CONSOLE ===
        var debugLines = [];
        var debugConsole = document.getElementById("debugConsole");

        function logToScreen(type, args) {
            var msg = Array.prototype.slice.call(args).map(function(a) {
                if (a instanceof Error) return a.message + " | stack: " + a.stack;
                if (typeof a === 'object') {
                    try { return JSON.stringify(a); } catch(e) { return String(a); }
                }
                return String(a);
            }).join(' ');
            var time = new Date().toLocaleTimeString();
            var line = "[" + time + "] [" + type + "] " + msg;
            debugLines.push(line);
            debugConsole.textContent = debugLines.join("\n");
            debugConsole.scrollTop = debugConsole.scrollHeight;
        }

        var originalLog = console.log;
        var originalError = console.error;
        var originalWarn = console.warn;

        console.log = function() {
            logToScreen("LOG", arguments);
            originalLog.apply(console, arguments);
        };
        console.error = function() {
            logToScreen("ERROR", arguments);
            originalError.apply(console, arguments);
        };
        console.warn = function() {
            logToScreen("WARN", arguments);
            originalWarn.apply(console, arguments);
        };

        window.addEventListener('error', function(e) {
            logToScreen("UNCAUGHT", [e.message + " @ " + e.filename + ":" + e.lineno]);
        });
        window.addEventListener('unhandledrejection', function(e) {
            logToScreen("UNHANDLED_PROMISE", [e.reason]);
        });

        function copyDebugLog() {
            var text = debugLines.join("\n");
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function() {
                    alert("Logs copiés !");
                }).catch(function() {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            var textarea = document.createElement("textarea");
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                alert("Logs copiés (fallback) !");
            } catch (e) {
                alert("Impossible de copier automatiquement. Sélectionne le texte manuellement.");
            }
            document.body.removeChild(textarea);
        }

        // === LOG D'ENVIRONNEMENT AU DÉMARRAGE ===
        console.log("=== ENVIRONNEMENT ===");
        console.log("Capacitor présent:", typeof window.Capacitor !== 'undefined');
        if (window.Capacitor) {
            console.log("Capacitor.Plugins présent:", typeof window.Capacitor.Plugins !== 'undefined');
            if (window.Capacitor.Plugins) {
                console.log("Haptics présent:", typeof window.Capacitor.Plugins.Haptics !== 'undefined');
                console.log("LocalNotifications présent:", typeof window.Capacitor.Plugins.LocalNotifications !== 'undefined');
            }
        }
        console.log("Notification.permission actuel:", (typeof Notification !== 'undefined') ? Notification.permission : "Notification API absente");

        // === LOGIQUE PRINCIPALE ===
        async function declencherAction() {
            const status = document.getElementById("status");
            status.textContent = "Action déclenchée...";
            console.log("=== CLIC BOUTON ===");

            // === VIBRATION ===
            if (navigator.vibrate) {
                console.log("Appel navigator.vibrate(200)");
                navigator.vibrate(200);
            } else {
                console.log("navigator.vibrate non disponible");
            }

            // === NOTIFICATION ===
            try {
                console.log("Appel Notification.requestPermission()...");
                const permission = await Notification.requestPermission();
                console.log("Résultat requestPermission:", permission);
                
                if (permission !== "granted") {
                    status.textContent = "❌ Permission de notification refusée";
                    console.log("Permission refusée, arrêt.");
                    return;
                }

                console.log("Programmation du setTimeout (30s)...");
                setTimeout(() => {
                    try {
                        console.log("Tentative de création new Notification()...");
                        const notification = new Notification("Rappel", {
                            body: "Tu as cliqué sur le bouton il y a 30 secondes !",
                            tag: "rappel-unique"
                        });
                        console.log("Notification créée avec succès:", notification);

                        setTimeout(() => {
                            try {
                                notification.close();
                                console.log("notification.close() appelé");
                            } catch(e) {
                                console.error("Erreur close():", e);
                            }
                        }, 8000);

                    } catch (e) {
                        console.error("Erreur création Notification:", e);
                    }
                }, 30000);

                status.textContent = "✅ Vibration faite + Notification programmée dans 30 secondes";

            } catch (err) {
                console.error("Erreur requestPermission:", err);
                status.textContent = "❌ Erreur: " + (err && err.message ? err.message : String(err));
            }
        }
    </script>

</body>
</html>
