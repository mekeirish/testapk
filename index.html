<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouton Vibration + Notification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }
        button {
            padding: 20px 40px;
            font-size: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        button:active {
            background-color: #45a049;
        }
        #status {
            margin-top: 30px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>Bouton Vibration + Notification</h1>
    
    <button onclick="declencherAction()">🔄 Vibrer + Notification dans 30s</button>

    <p id="status"></p>

    <script>
        async function declencherAction() {
            const status = document.getElementById("status");
            status.textContent = "Action déclenchée...";

            // === VIBRATION ===
            if (navigator.vibrate) {
                navigator.vibrate(200);
            }

            // === NOTIFICATION ===
            try {
                // Toujours demander la permission explicitement
                const permission = await Notification.requestPermission();
                
                if (permission !== "granted") {
                    status.textContent = "❌ Permission de notification refusée";
                    return;
                }

                // Programmer la notification dans 30 secondes
                setTimeout(() => {
                    try {
                        const notification = new Notification("Rappel", {
                            body: "Tu as cliqué sur le bouton il y a 30 secondes !",
                            icon: "https://via.placeholder.com/128", // optionnel
                            tag: "rappel-unique" // évite les doublons
                        });

                        // Optionnel : fermer la notification après quelques secondes
                        setTimeout(() => {
                            notification.close();
                        }, 8000);

                    } catch (e) {
                        console.error("Erreur notification :", e);
                    }
                }, 30000);

                status.textContent = "✅ Vibration faite + Notification programmée dans 30 secondes";

            } catch (err) {
                console.error(err);
                status.textContent = "❌ Erreur lors de la demande de permission";
            }
        }
    </script>

</body>
</html>
