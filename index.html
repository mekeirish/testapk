<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouton Vibrant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }
        button {
            padding: 20px 40px;
            font-size: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        button:active {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <h1>Clique sur le bouton</h1>
    
    <button onclick="vibrer()">
        🔄 Faire vibrer
    </button>

    <script>
        function vibrer() {
            // Vibre pendant 200 millisecondes
            if (navigator.vibrate) {
                navigator.vibrate(200);
            } else {
                alert("La vibration n'est pas supportée sur cet appareil/navigateur.");
            }
        }
    </script>

</body>
</html>
